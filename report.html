<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Report | Intel Learn</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="bg-soft">
  <div id="appNavbar"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h2 class="mb-0">Personalized Career Analysis Report</h2>
        <p class="text-muted mb-0">This report is based on your IQ + Interest responses.</p>
      </div>
      <a href="./dashboard.html" class="btn btn-outline-secondary">Back</a>
    </div>

    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5>IQ Score</h5>
            <p class="display-6 mb-1" id="iqScoreText">--</p>
            <p class="text-muted mb-0" id="iqLevelText">--</p>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5>Interest Profile (Radar Chart)</h5>
            <canvas id="interestChart" height="140"></canvas>
          </div>
        </div>
      </div>

      <div class="col-12">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5>Guidance</h5>
            <div class="alert alert-info mb-0" id="guidanceText">
              Loading guidance...
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-3" id="toastRoot"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script type="module" src="./js/pages/reportPage.js"></script>
</body>
</html>
